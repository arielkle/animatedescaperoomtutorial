<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדר בריחה מונפש - אריאל קלפנר</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #0b1120;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .theme-font { 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* פס גלילה מעוצב */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .glow-cyan {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-page {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons (SVG Components) ---
        const HomeIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        );
        const EyeIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const BrainIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.203A4.002 4.002 0 0 0 12 21a4.002 4.002 0 0 0 7.003-1.902 4 4 0 0 0 .52-8.203 4 4 0 0 0-2.526-5.77A3 3 0 1 0 12 5Z"/><path d="M9 13a4.5 4.5 0 0 0 3 4"/><path d="M15 13a4.5 4.5 0 0 1-3 4"/><path d="M12 17v4"/></svg>
        );
        const SparklesIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const EditIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        );
        const ExternalLinkIcon = ({ size = 20 }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
        );

        function App() {
          const [activePage, setActivePage] = useState(1);
          const [imgSrc, setImgSrc] = useState('pic.png');

          // Updated the embedded application URL for the first page
          const embeddedAppUrl = "https://arielkle.github.io/animatedescaperoomapplication/"; 

          const navItems = [
            { id: 1, title: 'ראשי', icon: <HomeIcon /> },
            { id: 2, title: 'הצגת חדר הבריחה', icon: <EyeIcon /> },
            { id: 3, title: 'יצירת חידות (AI)', icon: <BrainIcon /> },
            { id: 5, title: 'הנפשת חידות', icon: <SparklesIcon /> },
            { id: 4, title: 'בנייה ועריכה', icon: <EditIcon /> }
          ];

          return (
            <div dir="rtl" className="min-h-screen pb-16">
              
              {/* Navigation Menu */}
              <nav className="bg-slate-900/90 backdrop-blur-md shadow-2xl sticky top-0 z-50 p-4 border-b border-cyan-900/40">
                <div className="container mx-auto flex justify-center">
                  <ul className="flex flex-wrap justify-center gap-2 md:gap-4">
                    {navItems.map((item) => (
                      <li key={item.id}>
                        <button
                          onClick={() => setActivePage(item.id)}
                          className={`flex items-center gap-2 px-5 py-2 rounded-full transition-all duration-300 text-sm md:text-base font-bold theme-font tracking-tight ${
                            activePage === item.id 
                              ? 'bg-cyan-600 text-white shadow-[0_0_15px_rgba(6,182,212,0.5)] scale-105' 
                              : 'bg-slate-800/50 hover:bg-slate-700 text-cyan-400 border border-slate-700'
                          }`}
                        >
                          {item.icon}
                          <span className={activePage === item.id ? 'block' : 'hidden md:block'}>{item.title}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </nav>

              <main className="container mx-auto px-4 mt-12 max-w-5xl">
                
                {/* Header Section */}
                <header className="flex flex-col items-center text-center mb-16 animate-page">
                  <h1 className="text-4xl md:text-6xl font-black text-cyan-400 mb-4 tracking-tighter drop-shadow-[0_0_10px_rgba(6,182,212,0.4)] theme-font">
                    חדר בריחה מונפש
                  </h1>
                  <h2 className="text-xl md:text-2xl font-bold text-slate-400 theme-font tracking-[0.2em] uppercase">
                    אריאל קלפנר | טכנופדגוגיה ו-AI
                  </h2>
                  
                  <div className="mt-8 relative group w-full flex justify-center">
                    <img 
                      src={imgSrc} 
                      alt="אריאל קלפנר" 
                      className="w-28 md:w-36 aspect-square rounded-full shadow-2xl border-2 border-cyan-500/50 object-cover glow-cyan transition-transform group-hover:scale-110 duration-500"
                      onError={() => setImgSrc('https://placehold.co/400x400/0b1120/06b6d4?text=AK')}
                    />
                  </div>
                </header>

                {/* Content Area */}
                <div className="glass-panel rounded-[2rem] p-6 md:p-12 shadow-2xl border border-slate-700/50 min-h-[500px]">
                  
                  {/* Page 1: Home */}
                  {activePage === 1 && (
                    <div className="animate-page flex flex-col items-center text-center">
                      <div className="bg-slate-950/50 border border-cyan-500/30 p-8 rounded-3xl mb-12 max-w-3xl w-full shadow-inner">
                        <p className="text-2xl md:text-3xl font-extrabold text-cyan-400 theme-font mb-4">
                          פלטפורמה ליצירה ומשחק
                        </p>
                        <p className="text-lg text-slate-300 leading-relaxed">
                          ברוכים הבאים למדריך המקיף לבניית חדר בריחה דיגיטלי. כאן תלמדו איך לשלב בינה מלאכותית, חידות מאתגרות וטכנולוגיה כדי ליצור חוויה לימודית מסתורית ומרתקת.
                        </p>
                      </div>

                      <h3 className="text-xl font-bold mb-6 text-slate-400 tracking-widest uppercase theme-font flex items-center gap-2">
                        <EyeIcon size={22} /> הצצה למערכת התוצרים
                      </h3>
                      
                      <div className="w-full max-w-4xl h-[500px] rounded-2xl overflow-hidden shadow-2xl border-4 border-slate-800 mb-8 bg-black relative glow-cyan">
                        <iframe 
                          className="w-full h-full opacity-90" 
                          src={embeddedAppUrl} 
                          title="Escape Room App Preview" 
                          frameBorder="0">
                        </iframe>
                      </div>

                      <a 
                        href={embeddedAppUrl} 
                        target="_blank" 
                        rel="noreferrer" 
                        className="inline-flex items-center gap-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all shadow-xl theme-font tracking-widest uppercase transform hover:scale-105 mb-16"
                      >
                        <span>כניסה למערכת המלאה</span>
                        <ExternalLinkIcon size={20} />
                      </a>

                      {/* Navigation Grid */}
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-5xl">
                        <button onClick={() => setActivePage(2)} className="group p-6 bg-slate-900/80 rounded-2xl border border-slate-700 hover:border-cyan-500/50 transition-all transform hover:-translate-y-2 text-center">
                          <div className="bg-slate-800 w-12 h-12 rounded-xl flex items-center justify-center mb-4 mx-auto border border-slate-700 group-hover:bg-cyan-900/30 group-hover:border-cyan-500 transition-all">
                            <EyeIcon size={24} className="text-cyan-500" />
                          </div>
                          <h3 className="text-md font-bold text-cyan-100 theme-font">הצגת החדר</h3>
                        </button>

                        <button onClick={() => setActivePage(3)} className="group p-6 bg-slate-900/80 rounded-2xl border border-slate-700 hover:border-cyan-500/50 transition-all transform hover:-translate-y-2 text-center">
                          <div className="bg-slate-800 w-12 h-12 rounded-xl flex items-center justify-center mb-4 mx-auto border border-slate-700 group-hover:bg-cyan-900/30 group-hover:border-cyan-500 transition-all">
                            <BrainIcon size={24} className="text-cyan-500" />
                          </div>
                          <h3 className="text-md font-bold text-cyan-100 theme-font">יצירת חידות</h3>
                        </button>

                        <button onClick={() => setActivePage(5)} className="group p-6 bg-slate-900/80 rounded-2xl border border-slate-700 hover:border-cyan-500/50 transition-all transform hover:-translate-y-2 text-center">
                          <div className="bg-slate-800 w-12 h-12 rounded-xl flex items-center justify-center mb-4 mx-auto border border-slate-700 group-hover:bg-cyan-900/30 group-hover:border-cyan-500 transition-all">
                            <SparklesIcon size={24} className="text-cyan-500" />
                          </div>
                          <h3 className="text-md font-bold text-cyan-100 theme-font">הנפשת חידות</h3>
                        </button>

                        <button onClick={() => setActivePage(4)} className="group p-6 bg-slate-900/80 rounded-2xl border border-slate-700 hover:border-cyan-500/50 transition-all transform hover:-translate-y-2 text-center">
                          <div className="bg-slate-800 w-12 h-12 rounded-xl flex items-center justify-center mb-4 mx-auto border border-slate-700 group-hover:bg-cyan-900/30 group-hover:border-cyan-500 transition-all">
                            <EditIcon size={24} className="text-cyan-500" />
                          </div>
                          <h3 className="text-md font-bold text-cyan-100 theme-font">בנייה ועריכה</h3>
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Tutorials Pages */}
                  {[2, 3, 4, 5].includes(activePage) && (
                    <div className="animate-page flex flex-col items-center text-center">
                      <div className="bg-slate-950/80 border border-cyan-500/40 text-cyan-400 px-10 py-4 rounded-2xl mb-8 shadow-lg">
                        <h3 className="text-2xl md:text-3xl font-black theme-font tracking-widest uppercase">
                          {navItems.find(n => n.id === activePage).title}
                        </h3>
                      </div>
                      
                      <p className="text-lg md:text-xl text-slate-300 mb-10 max-w-2xl leading-relaxed">
                        {activePage === 2 && "צפו בסרטון ההדגמה של חדר הבריחה המלא כדי להבין את זרימת המשחק והפדגוגיה."}
                        {activePage === 3 && "כך תשתמשו בכלי הבינה המלאכותית המתקדמים ביותר כדי ליצור תוכן מאתגר ומרתק."}
                        {activePage === 5 && "בואו ללמוד איך לקחת את התמונות והחידות שלכם ולהפוך אותן לחיות ומונפשות ליצירת חוויה סוחפת."}
                        {activePage === 4 && "השלב הטכני: איך להעלות תמונות, להגדיר אזורי לחיצה ולפרסם את החדר שלכם."}
                      </p>

                      <div className="w-full max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)] border-4 border-slate-800 bg-black glow-cyan">
                        <iframe 
                          className="w-full h-full opacity-90" 
                          src={
                            activePage === 2 ? "https://www.youtube.com/embed/EbzIDTOHYFo" :
                            activePage === 3 ? "https://www.youtube.com/embed/9jpr__bYG6Y" :
                            activePage === 5 ? "https://www.youtube.com/embed/iSc0JrVIzc0" :
                            "https://www.youtube.com/embed/U76AhPPNh8g"
                          } 
                          title="Tutorial Video" 
                          frameBorder="0" 
                          allowFullScreen>
                        </iframe>
                      </div>
                    </div>
                  )}
                  
                </div>
              </main>

              {/* Footer */}
              <footer className="container mx-auto mt-20 pb-10 text-center">
                <div className="inline-block bg-slate-900/50 px-8 py-4 rounded-2xl border border-slate-800">
                    <img 
                      src="pic.png" 
                      className="w-12 h-12 rounded-full mx-auto mb-3 border border-cyan-500/30" 
                      onError={(e) => e.target.style.display='none'} 
                      alt=""
                    />
                    <p className="text-cyan-500 font-bold theme-font text-sm tracking-widest uppercase">אריאל קלפנר | 050-9540538</p>
                    <p className="text-slate-500 text-xs mt-1">טכנופדגוגיה, הערכה ובינה מלאכותית בחינוך</p>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
